name: chess_master
description: Production-ready Flutter chess app with Firebase multiplayer
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Chess engine
  chess: ^0.8.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  cloud_functions: ^5.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # UI & animations
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

  # Audio
  just_audio: ^0.9.40

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.0.2
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/pieces/
    - assets/sounds/
    - assets/boards/
    - assets/images/
